apiVersion: v1
kind: Namespace
metadata:
  name: gemma4-test
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hyperdisk-balanced-tpu
provisioner: pd.csi.storage.gke.io
parameters:
  type: hyperdisk-balanced
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hd-claim-v2
  namespace: gemma4-test
spec:
  storageClassName: hyperdisk-balanced-tpu
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1000Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-tpu
  namespace: gemma4-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-tpu
  template:
    metadata:
      labels:
        app: vllm-tpu
    spec:
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu7x
        cloud.google.com/gke-tpu-topology: 2x2x1
      containers:
      - name: vllm-tpu
        image: vllm/vllm-tpu:gemma4
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]

        args:
        - --host=0.0.0.0
        - --port=8000
        - --seed=42
        - --tensor-parallel-size=8
        - --max-model-len=16384
        - --download-dir=/data
        - --no-enable-prefix-caching
        - --model=google/gemma-4-31B-it
        - --async-scheduling
        - --gpu-memory-utilization=0.90
        - --disable_chunked_mm_input
        - --enable-auto-tool-choice
        - --tool-call-parser=gemma4

        env:
        - name: HF_HOME
          value: /data
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: hf_api_token
        - name: MODEL_IMPL_TYPE
          value: vllm
        ports:
        - containerPort: 8000
        resources:
          limits:
            google.com/tpu: '4' # Number of chips required by topology
          requests:
            google.com/tpu: '4'
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - mountPath: "/data"
          name: data-volume
        - mountPath: /dev/shm
          name: dshm
      volumes:
      - emptyDir:
          medium: Memory
        name: dshm
      - name: data-volume
        persistentVolumeClaim:
          claimName: hd-claim-v2
